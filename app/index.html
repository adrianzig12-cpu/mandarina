<!doctype html>
<html lang="es"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mandarina · la app de tu estudio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
:root{
  /* acento temático (default Mandarina) — se cambia con el switcher */
  --accD:#EE7A21;--accM:#F5924A;--acc:#F7B98A;--accL:#FDECDD;
  --bd:rgba(238,122,33,.26);--bds:rgba(238,122,33,.5);
  /* semánticos fijos */
  --blue:#9DCFE8;--blue-l:#E4F4FB;--blue-d:#5BAAD0;
  --gold:#E8B84B;--gold-l:#FDF3DC;
  --cream:#FFFBF7;--white:#fff;
  --text:#3D2535;--text-m:#7A4F63;--text-s:#B08090;
  --green-l:#E8F5E9;--green-d:#2E7D32;--red-l:#FFEBEE;--red-d:#C62828;
  --serif:'Playfair Display','Didot','Bodoni MT',Georgia,serif;
  --sans:'DM Sans',system-ui,-apple-system,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
button,[onclick]{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior-y:contain}
body{font-family:var(--sans);font-size:13px;background:var(--cream);color:var(--text)}
.serif{font-family:var(--serif)}
.star{color:var(--gold)}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--accL) 0%,var(--blue-l) 100%);padding:20px}
.login-box{background:var(--white);border-radius:20px;padding:38px 34px;border:1px solid var(--bds);width:330px;text-align:center}
.login-logo{font-family:var(--serif);font-style:italic;font-size:32px;color:var(--text)}
.login-sub{font-size:11px;color:var(--text-s);letter-spacing:.5px;margin:4px 0 8px}
.login-stars{color:var(--gold);font-size:13px;letter-spacing:4px;margin-bottom:24px}
.user-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.user-btn{padding:11px 6px;border-radius:12px;cursor:pointer;border:1.5px solid var(--bd);background:var(--cream);text-align:center;transition:.15s}
.user-btn:hover{border-color:var(--accM);background:var(--accL)}
.user-btn.selected{border-color:var(--accD);background:var(--accL)}
.user-av{width:38px;height:38px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500}
.av-u0{background:var(--accL);color:var(--accD)}.av-u1{background:var(--blue-l);color:var(--blue-d)}.av-u2{background:var(--gold-l);color:#A07820}
.user-name{font-size:12px;color:var(--text-m);font-weight:500}.user-role{font-size:10px;color:var(--text-s)}
.pin-input{width:100%;padding:11px 14px;border:1.5px solid var(--bds);border-radius:10px;font-family:var(--sans);font-size:16px;color:var(--text);text-align:center;letter-spacing:8px;outline:none;margin-bottom:14px}
.pin-input:focus{border-color:var(--accD)}
.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,var(--accM),var(--accD));color:#fff;border:none;border-radius:10px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer}
.login-hint{font-size:11px;color:var(--text-s);margin-top:14px}
.login-brands{margin-top:22px;border-top:1px solid var(--bd);padding-top:16px}
.lb-lbl{font-size:10px;color:var(--text-s);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.lb-chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.lb-chip{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--bd);border-radius:20px;padding:5px 11px;font-size:11px;font-weight:500;color:var(--text-m);cursor:pointer;background:var(--white)}
.lb-chip.on{border-color:var(--accD);color:var(--accD);background:var(--accL)}
.lb-dot{width:10px;height:10px;border-radius:50%}

/* APP */
#app{display:none;height:100vh;flex-direction:row}
.sidebar{width:196px;min-width:196px;background:var(--white);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:18px 0 14px;height:100vh;overflow-y:auto}
.logo-area{padding:0 16px 14px;border-bottom:1px solid var(--bd);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.logo-title{font-family:var(--serif);font-style:italic;font-size:21px;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text-s);margin-top:2px}
.thm-btn{background:var(--accL);border:1px solid var(--bds);border-radius:8px;width:30px;height:30px;font-size:15px;cursor:pointer}
.session-area{padding:0 12px 10px;border-bottom:1px solid var(--bd);margin-bottom:6px}
.session-label{font-size:10px;color:var(--text-s);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.session-chip{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;background:var(--accL);border:1px solid var(--bds)}
.session-av{width:26px;height:26px;border-radius:50%;background:var(--accD);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
.session-name{font-size:12px;font-weight:500;color:var(--accD);flex:1}
.btn-logout{font-size:10px;color:var(--text-s);cursor:pointer;background:none;border:none}.btn-logout:hover{color:var(--accD)}
.nav-section{padding:0 8px}
.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-s);padding:0 8px;margin:12px 0 3px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text-m);transition:.15s;font-size:13px}
.nav-item:hover{background:var(--accL)}
.nav-item.active{background:var(--accL);color:var(--accD);font-weight:500}
.nav-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.6}
.sidebar-footer{margin-top:auto;padding:12px 16px 0;border-top:1px solid var(--bd);font-size:10px;color:var(--text-s)}

.main{flex:1;overflow-y:auto;padding:22px 24px;background:var(--cream);-webkit-overflow-scrolling:touch}
.page{display:none}.page.active{display:block}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.page-title{font-family:var(--serif);font-size:22px;color:var(--text)}
.page-date{font-size:12px;color:var(--text-s);margin-top:2px}
.btn-pri{background:linear-gradient(135deg,var(--accM),var(--accD));color:#fff;border:none;border-radius:10px;padding:9px 15px;font-size:12px;font-family:var(--sans);cursor:pointer;font-weight:500}
.btn-sec{background:var(--white);color:var(--text-m);border:1px solid var(--bds);border-radius:10px;padding:8px 14px;font-size:12px;font-family:var(--sans);cursor:pointer}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.b-conf{background:var(--blue-l);color:var(--blue-d)}.b-pend{background:var(--gold-l);color:#9A7020}
.b-real{background:var(--green-l);color:var(--green-d)}.b-canc{background:var(--red-l);color:var(--red-d)}
.b-serv{background:var(--accL);color:var(--accD)}.b-ret{background:#F3EFF8;color:#7B5EA7}

.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.mcard{background:var(--white);border:1px solid var(--bd);border-radius:12px;padding:14px}
.mcard.pk{background:var(--accL);border-color:var(--bds)}.mcard.bl{background:var(--blue-l);border-color:rgba(157,207,232,.5)}.mcard.gd{background:var(--gold-l);border-color:rgba(232,184,75,.3)}
.mlbl{font-size:11px;color:var(--text-s);margin-bottom:5px}
.mval{font-size:21px;font-weight:600;color:var(--text);line-height:1;font-family:var(--serif)}
.msub{font-size:11px;color:var(--text-s);margin-top:4px}
.card{background:var(--white);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}

.cita-row{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--bd)}
.cita-row:last-child{border-bottom:none;padding-bottom:0}.cita-row:first-child{padding-top:0}
.ctime{min-width:46px;font-size:12px;font-weight:500;color:var(--text-m);padding-top:1px}
.cinfo{flex:1}.cname{font-size:13px;font-weight:500}.csvc{font-size:11px;color:var(--text-s);margin-top:1px}
.cmeta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}.catiende{font-size:11px;color:var(--text-s)}
.cprice{font-size:13px;font-weight:500;text-align:right;white-space:nowrap}

.cobro-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd)}
.cobro-row:last-child{border-bottom:none}
.cav{width:34px;height:34px;border-radius:50%;background:var(--accL);color:var(--accD);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;min-width:34px}
.cmain{flex:1}.cnombre{font-size:13px;font-weight:500}.csrvlbl{font-size:11px;color:var(--text-s)}
.cright{text-align:right}.cmonto{font-size:14px;font-weight:600;font-family:var(--serif)}
.mpill{font-size:10px;padding:2px 7px;border-radius:20px;display:inline-block}
.mp-ef{background:var(--green-l);color:var(--green-d)}.mp-tr{background:var(--blue-l);color:var(--blue-d)}.mp-tj{background:#EDE7F6;color:#5E35B1}
.comnote{font-size:10px;color:#9A7020;background:var(--gold-l);border-radius:6px;padding:3px 8px;margin-top:6px;display:inline-block}

/* estatus tiles */
.estat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.estat-tile{border-radius:10px;padding:11px 8px;text-align:center;border:1px solid var(--bd)}
.estat-n{font-size:19px;font-weight:600;font-family:var(--serif)}.estat-l{font-size:10px;color:var(--text-s);margin-top:2px}
.estat-tile.pend{background:var(--gold-l)}.estat-tile.conf{background:var(--blue-l)}.estat-tile.serv{background:var(--accL)}
.estat-tile.real{background:var(--green-l)}.estat-tile.noas{background:#FFF3E0}.estat-tile.canc{background:var(--red-l)}

/* mini chart semana */
.mini-chart{display:flex;align-items:flex-end;gap:5px;height:54px;margin-top:8px}
.bc{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;height:100%;justify-content:flex-end}
.bf{width:100%;border-radius:3px 3px 0 0;background:var(--accL)}.bf.acc{background:var(--accM)}.blb{font-size:9px;color:var(--text-s)}

/* insights */
.ins-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.ins-mini{background:var(--cream);border:1px solid var(--bd);border-radius:10px;padding:11px}
.ins-mini.good{background:linear-gradient(135deg,var(--green-l),var(--cream));border-color:rgba(46,125,50,.25)}
.ins-mini.info{background:linear-gradient(135deg,var(--blue-l),var(--cream));border-color:rgba(91,170,208,.25)}
.ins-lbl{font-size:10px;color:var(--text-s);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.ins-val{font-size:18px;font-weight:600;font-family:var(--serif)}
.ins-sub{font-size:11px;color:var(--text-m);margin-top:2px}
.ins-row{margin-top:14px;padding-top:12px;border-top:1px dashed var(--bd)}
.ins-row .ins-lbl{margin-bottom:8px;font-weight:500;color:var(--accD)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.blbl{font-size:12px;color:var(--text-m);min-width:120px}.btrack{flex:1;height:8px;background:var(--accL);border-radius:4px;overflow:hidden}
.bfill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accM),var(--gold))}.bval{font-size:12px;font-weight:500;min-width:34px;text-align:right}
.ins-chart{display:flex;align-items:flex-end;gap:6px;height:110px;padding:8px 4px 0}
.ins-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.ins-b{width:100%;max-width:36px;background:linear-gradient(180deg,var(--acc),var(--accM));border-radius:6px 6px 0 0;min-height:4px}
.ins-blb{font-size:10px;color:var(--text-s);margin-top:4px}
.growth{display:flex;flex-wrap:wrap;gap:6px}
.gtag{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500}
.gt-up{background:var(--green-l);color:var(--green-d)}.gt-dn{background:var(--red-l);color:var(--red-d)}.gt-new{background:var(--gold-l);color:#9A4A00}
.ins-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd);font-size:12px}
.ins-item:last-child{border-bottom:none}

/* tabs / search */
.tab-bar{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:7px 15px;border-radius:8px;font-size:12px;cursor:pointer;color:var(--text-s);border:1px solid transparent;flex-shrink:0}
.tab.active{background:var(--accL);color:var(--accD);border-color:var(--bds);font-weight:500}
.search-bar{display:flex;align-items:center;background:var(--white);border:1px solid var(--bds);border-radius:10px;padding:9px 12px;gap:8px;margin-bottom:14px}
.search-bar input{border:none;background:transparent;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;flex:1}

/* clientas */
#clientas-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cl-card{background:var(--white);border:1px solid var(--bd);border-radius:14px;padding:14px;cursor:pointer;transition:.15s}
.cl-card:hover{border-color:var(--accM)}
.cl-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.av-lg{width:40px;height:40px;border-radius:50%;background:var(--accL);color:var(--accD);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;min-width:40px}
.cl-name{font-size:14px;font-weight:500}.cl-tel{font-size:11px;color:var(--text-s)}
.cl-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.cl-stats{display:flex;gap:6px;border-top:1px solid var(--bd);padding-top:8px}
.cl-stats>div{flex:1}.sm-val{font-size:14px;font-weight:600;text-align:center;font-family:var(--serif)}.sm-lbl{font-size:10px;color:var(--text-s);text-align:center}
.chip-sm{font-size:10px;padding:2px 8px;border-radius:20px}
.wa-btn{width:100%;margin-top:10px;background:#25D366;color:#fff;border:none;border-radius:9px;padding:8px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--sans)}

/* calendario */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-title{font-family:var(--serif);font-size:17px;font-weight:500}
.cal-nav-btn{background:var(--white);border:1px solid var(--bds);border-radius:8px;width:34px;height:34px;font-size:18px;color:var(--text-m);cursor:pointer}
.cal-nav-btn:hover{background:var(--accL);border-color:var(--accM);color:var(--accD)}
.cal-leyenda{display:flex;gap:12px;margin-bottom:10px;font-size:11px;color:var(--text-s);flex-wrap:wrap}
.cal-ley-i{display:flex;align-items:center;gap:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px}
.cal-head>div{font-size:10px;font-weight:500;color:var(--text-s);text-align:center;padding:4px 2px;text-transform:uppercase;letter-spacing:.5px}
.cal-day{min-height:74px;background:var(--white);border:1px solid var(--bd);border-radius:8px;padding:5px;cursor:pointer;transition:.15s;overflow:hidden}
.cal-day:hover{border-color:var(--accM);background:var(--accL)}
.cal-day.today{border-color:var(--accM);background:var(--accL)}
.cal-day.sel{border:2px solid var(--accD);background:var(--accL)}
.cal-day.empty{background:transparent;border:none;cursor:default}
.cal-day-num{font-size:12px;color:var(--text-m);line-height:1;margin-bottom:3px}
.cal-day.today .cal-day-num{color:var(--accD);font-weight:600}
.cal-mini{font-size:9px;line-height:1.35;padding:1px 4px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;border-left:2px solid;background:rgba(255,255,255,.7)}
.cm-pend{border-color:var(--gold);color:#9A7020}.cm-conf{border-color:var(--blue-d);color:var(--blue-d)}
.cm-serv{border-color:var(--accD);color:var(--accD)}.cm-real{border-color:var(--green-d);color:var(--green-d)}

/* day view (cascada) */
.dv{position:relative;margin-top:2px}
.dv-hr{height:52px;border-top:1px solid var(--bd);position:relative}
.dv-hr .h{position:absolute;left:0;top:-8px;font-size:10px;color:var(--text-s);background:var(--white);padding-right:4px}
.dv-track{position:absolute;left:42px;right:0;top:0;bottom:0}
.dv-appt{position:absolute;border-radius:9px;padding:5px 8px;color:#fff;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.dv-appt .w{font-size:11px;font-weight:600;line-height:1.15}.dv-appt .s{font-size:10px;opacity:.9}
.dv-p{background:linear-gradient(150deg,#F2C265,#DDA33A);color:#4a3312}
.dv-c{background:linear-gradient(150deg,#7EC0DE,#4E9BC4)}.dv-r{background:linear-gradient(150deg,#5FA863,#2E7D32)}

.divlbl{font-size:10px;color:var(--text-s);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:8px;margin:12px 0 8px}
.divlbl::after{content:'';flex:1;height:1px;background:var(--bd)}
.moni-banner{background:var(--gold-l);border:1px solid rgba(232,184,75,.4);border-radius:10px;padding:10px 14px;font-size:12px;color:#7A5A10;margin-bottom:14px}
.notacc{text-align:center;padding:44px 20px;color:var(--text-s)}.notacc .i{font-size:30px}.notacc h3{font-family:var(--serif);font-size:17px;color:var(--text);margin:10px 0 4px}
.form-row{margin-bottom:12px;flex:1}
.form-lbl{font-size:11px;color:var(--text-s);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-ctrl{width:100%;padding:9px 12px;border:1px solid var(--bds);border-radius:8px;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--white);outline:none}
.form-ctrl:focus{border-color:var(--accD)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);z-index:120;background:var(--text);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:500;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.3)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* modales */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(61,37,53,.45);z-index:110;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:16px;padding:22px;width:400px;max-width:96vw;max-height:92vh;overflow-y:auto;border:1px solid var(--bds)}
.modal-title{font-family:var(--serif);font-size:20px;margin-bottom:2px}
.modal-sub{font-size:12px;color:var(--text-s);margin-bottom:12px}
.pills{display:flex;gap:6px;margin:12px 0}
.pill{flex:1;text-align:center;font-size:11px;font-weight:500;padding:8px 4px;border-radius:9px;background:var(--cream);border:1px solid var(--bd);color:var(--text-s);cursor:pointer}
.pill.on{background:var(--gold-l);border-color:var(--gold);color:#9A7020}
.wa-full{width:100%;background:#25D366;color:#fff;border:none;border-radius:11px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-bottom:8px}
.det-acts{display:flex;gap:8px}.det-acts button{flex:1}
.pays{display:flex;gap:8px;margin-top:6px}
.pay-opt{flex:1;text-align:center;padding:10px;border-radius:10px;border:1px solid var(--bds);background:var(--white);font-size:12px;font-weight:500;color:var(--text);cursor:pointer}
.pay-opt.on{background:var(--accL);border-color:var(--accD);color:var(--accD)}
.photos{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}

function calendar(){
  var days=31, first=CAL_FIRST; // 0=Lun
  var cells='';

  for(var d=1;d<=days;d++){
    var evs=MES[d]||[];
    var mini=evs.slice(0,3).map(function(e){return '<div class="cal-mini cm-'+e.st+'">'+e.c+'</div>';}).join('')+(evs.length>3?'<div style="font-size:9px;color:var(--text-s);margin-top:1px">+'+(evs.length-3)+' más</div>':'');
    cells+='<div class="cal-day'+(d===4?' today':'')+'" data-d="'+d+'"><div class="cal-day-num">'+d+'</div>'+mini+'</div>';
  }
  return '<div class="cal-nav"><button class="cal-nav-btn">‹</button><div class="cal-nav-title">Julio 2026</div><button class="cal-nav-btn">›</button></div>'+
    '<div class="cal-leyenda"><div class="cal-ley-i"><span style="width:9px;height:9px;border-radius:2px;background:var(--gold-l);border-left:2px solid var(--gold)"></span>Pendiente</div>'+

    '<div class="cal-grid cal-head"><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div></div>'+
    '<div class="cal-grid" id="cal-body">'+cells+'</div><div id="cal-det"></div>';
}
function bindCal(){
  document.querySelectorAll('#cal-body .cal-day[data-d]').forEach(function(c){c.onclick=function(){
    document.querySelectorAll('#cal-body .cal-day').forEach(function(x){x.classList.remove('sel')});c.classList.add('sel');
    showDay(+c.getAttribute('data-d'));
  };});
  showDay(4);
}
function showDay(d){
  var list=(d===4)?AG:[]; // solo el día de hoy trae detalle completo en la demo
  var det='<div class="card" style="padding:0;margin-top:10px"><div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;flex-wrap:wrap;gap:6px"><div class="card-title" style="margin:0">'+d+' de julio</div><div style="display:flex;gap:6px"><button class="btn-sec" style="font-size:11px" onclick="toast(\'Horario bloqueado (demo)\')">🔒 Bloquear</button><button class="btn-pri" style="font-size:11px" onclick="openNuevaCita()">+ Cita</button></div></div>';
  if(list.length){det+='<div style="padding:8px 14px 16px">'+dayView(list)+'</div>';}
  else{det+='<div style="padding:20px;text-align:center;color:var(--text-s);font-size:12px">'+((MES[d]||[]).length?((MES[d].length)+' cita(s) — toca "+ Cita" para ver el detalle'):'Sin citas este día')+'</div>';}
  det+='</div>';
  var el=$('cal-det');if(el)el.innerHTML=det;
}
function dayView(list){
  var start=480,end=1140,px=52/60;
  var rows='';for(var t=start;t<end;t+=60){rows+='<div class="dv-hr"><span class="h">'+fmt(t)+'</span></div>';}
  var srt=list.slice().sort(function(a,b){return a.ini-b.ini});
  var bl=srt.map(function(a,i){
    var ind=0;for(var j=0;j<i;j++){var b=srt[j];if(b.ini<a.ini+a.dur&&b.ini+b.dur>a.ini)ind++;}
    var top=(a.ini-start)*px+2,hh=Math.max(a.dur*px-3,30),left=Math.min(ind*16,48);
    var cls=a.st==='conf'?'dv-c':a.st==='real'?'dv-r':'dv-p';
    return '<div class="dv-appt '+cls+'" style="top:'+top+'px;height:'+hh+'px;left:'+left+'px;right:0;z-index:'+(2+ind)+';cursor:pointer" onclick="openDetalle('+AG.indexOf(a)+')"><div class="w">'+a.at+' · '+a.c+'</div>'+(hh>40?'<div class="s">'+a.s+'</div>':'')+'</div>';
  }).join('');
  return '<div class="dv">'+rows+'<div class="dv-track">'+bl+'</div></div>';
}

  var h=pageHdr('Personal','<button class="btn-pri">+ Registrar pago</button>');
  h+='<div class="tab-bar"><div class="tab active">Semana 1</div><div class="tab">Semana 2</div><div class="tab">Mes</div></div>';
  h+='<div class="card"><div class="card-title">Pagos de la semana <span style="font-size:11px;color:var(--text-s);font-weight:400">Total: '+money(tot)+'</span></div>'+
    PERSONAL.map(function(p){return '<div class="cobro-row"><div class="cav">'+p.n[0]+'</div><div class="cmain"><div class="cnombre">'+p.n+'</div><div class="csrvlbl">'+p.rol+' · base '+money(p.base)+(p.com?' + comisión '+money(p.com):'')+'</div></div><div class="cright"><div class="cmonto">'+money(p.base+p.com)+'</div><span class="mpill mp-ef">Pagado</span></div></div>';}).join('')+'</div>';
  $('page-otras').innerHTML=h;
}
function renderCierre(){
  var ing=84200,gas=52600,util=ing-gas,margen=Math.round(util/ing*100);
  var h=pageHdr('Cierre Mensual','');
  h+='<div class="tab-bar"><div class="tab active">Julio</div><div class="tab">Junio</div><div class="tab">Mayo</div></div>';
  h+='<div class="grid2"><div class="mcard bl" style="margin:0"><div class="mlbl">Ingresos del mes</div><div class="mval" style="color:var(--green-d)">'+money(ing)+'</div><div class="msub">118 citas realizadas</div></div>'+
    '<div class="mcard pk" style="margin:0"><div class="mlbl">Gastos del mes</div><div class="mval" style="color:var(--red-d)">'+money(gas)+'</div><div class="msub">renta, nómina, insumos…</div></div></div>';
  h+='<div style="background:linear-gradient(135deg,var(--accL),var(--blue-l));border-radius:12px;padding:20px;text-align:center;border:1px solid var(--bd);margin-bottom:14px"><div style="font-size:12px;color:var(--text-m)">Utilidad estimada de julio</div><div style="font-family:var(--serif);font-size:32px">'+money(util)+'</div><div style="font-size:12px;color:var(--text-m);margin-top:4px">margen '+margen+'%</div></div>';
  h+='<div class="card"><div class="card-title">Desglose</div>'+
    [['Ingresos por cobros',ing,'green-d'],['− Renta',-18000,'red-d'],['− Nómina',-14380,'red-d'],['− Insumos',-3050,'red-d'],['− Otros gastos',-17170,'red-d'],['= Utilidad estimada',util,'accD']].map(function(r){return '<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd);font-size:13px"><span>'+r[0]+'</span><b style="color:var(--'+r[2]+')">'+(r[1]<0?'−'+money(-r[1]):money(r[1]))+'</b></div>';}).join('')+'</div>';
  $('page-otras').innerHTML=h;
}
function renderServicios(){
  var h=pageHdr('Servicios','<button class="btn-pri" onclick="toggleForm(\'serv-form\')">+ Nuevo servicio</button>');
  h+='<div id="serv-form" class="card" style="display:none;border:1px solid var(--bds);background:var(--accL)"><div class="card-title">Alta de servicio</div>'+
    formRow('Nombre','<input class="form-ctrl" id="sf-nombre" placeholder="Ej. Volumen Egipcio">')+
    '<div style="display:flex;gap:10px">'+formRow('Categoría','<select class="form-ctrl" id="sf-cat"><option>Pestañas</option><option>Alaciado</option><option>Cejas</option><option>Uñas</option></select>')+formRow('Duración (min)','<input class="form-ctrl" id="sf-dur" type="number" value="90">')+'</div>'+
    '<div style="display:flex;gap:10px">'+formRow('Precio base','<input class="form-ctrl" id="sf-base" type="number" value="700">')+formRow('Precio retoque','<input class="form-ctrl" id="sf-ret" type="number" value="400">')+'</div>'+
    '<div class="modal-actions"><button class="btn-sec" onclick="toggleForm(\'serv-form\')">Cancelar</button><button class="btn-pri" onclick="addServ()">Guardar servicio</button></div></div>';
  h+='<div class="card" style="padding:0"><div class="card-title" style="padding:14px 16px 6px">Catálogo <span style="font-size:11px;color:var(--text-s);font-weight:400">'+SERV.length+' servicios</span></div><div style="padding:0 16px 12px">'+SERV.map(function(s){return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd)"><div style="flex:1"><div style="font-size:13px;font-weight:500">'+s.s+'</div><div style="font-size:11px;color:var(--text-s)">'+s.cat+' · '+s.dur+' min</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:600">'+money(s.base)+'</div><div style="font-size:11px;color:var(--text-s)">retoque '+money(s.ret)+'</div></div></div>';}).join('')+'</div></div>';
  $('page-otras').innerHTML=h;
}
function addServ(){var n=$('sf-nombre').value||'Servicio nuevo';SERV.unshift({s:n,cat:$('sf-cat').value,base:+$('sf-base').value||0,ret:+$('sf-ret').value||0,dur:+$('sf-dur').value||60});renderServicios();toast('Servicio "'+n+'" agregado ✓');}
function renderUsuarios(){
  var h=pageHdr('Usuarios','<button class="btn-pri" onclick="toggleForm(\'usr-form\')">+ Nuevo usuario</button>');
  h+='<div id="usr-form" class="card" style="display:none;border:1px solid var(--bds);background:var(--accL)"><div class="card-title">Alta de usuario</div>'+
    formRow('Nombre','<input class="form-ctrl" id="uf-nombre" placeholder="Ej. Perla">')+
    '<div style="display:flex;gap:10px">'+formRow('Rol','<select class="form-ctrl" id="uf-rol"><option value="empleada">Empleada</option><option value="admin">Admin (dueña)</option></select>')+formRow('PIN','<input class="form-ctrl" id="uf-pin" maxlength="4" placeholder="4 dígitos">')+'</div>'+
    formRow('Email','<input class="form-ctrl" id="uf-email" placeholder="correo@estudio.com">')+
    formRow('WhatsApp','<input class="form-ctrl" id="uf-tel" placeholder="55 …">')+
    '<div class="modal-actions"><button class="btn-sec" onclick="toggleForm(\'usr-form\')">Cancelar</button><button class="btn-pri" onclick="addUsr()">Guardar usuario</button></div></div>';
  h+='<div class="card" style="padding:0"><div class="card-title" style="padding:14px 16px 6px">Equipo <span style="font-size:11px;color:var(--text-s);font-weight:400">'+USR.length+' usuarios</span></div><div style="padding:0 16px 12px">'+USR.map(function(u){return '<div class="cobro-row"><div class="cav">'+u.n[0]+'</div><div class="cmain"><div class="cnombre">'+u.n+'</div><div class="csrvlbl">'+u.email+' · '+u.tel+'</div></div><div class="cright"><span class="badge '+(u.rol==='admin'?'b-serv':'b-conf')+'">'+(u.rol==='admin'?'Dueña':'Empleada')+'</span></div></div>';}).join('')+'</div></div>';
  $('page-otras').innerHTML=h;
}
function addUsr(){var n=$('uf-nombre').value||'Usuario nuevo';USR.push({n:n,rol:$('uf-rol').value,email:$('uf-email').value||'—',tel:$('uf-tel').value||'—'});renderUsuarios();toast('Usuario "'+n+'" agregado ✓');}
function formRow(l,c){return '<div class="form-row"><div class="form-lbl">'+l+'</div>'+c+'</div>';}
function toggleForm(id){var e=$(id);if(!e)return;e.style.display=(e.style.display==='none'||!e.style.display)?'block':'none';if(e.style.display==='block')e.scrollIntoView({block:'nearest',behavior:'smooth'});}
var _tm;function toast(m){var t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(_tm);_tm=setTimeout(function(){t.classList.remove('on')},1900);}
function pageHdr(t,btn){return '<div class="page-header"><div><div class="page-title">'+t+' <span class="star">✦</span></div></div>'+(btn||'')+'</div>';}
function notacc(i,t,d){return '<div class="notacc"><div class="i">'+i+'</div><h3>'+t+'</h3><p style="font-size:12px">'+d+'</p></div>';}

/* ---------- util ---------- */
function fmt(m){var h=Math.floor(m/60),mm=m%60;return h+':'+(mm<10?'0':'')+mm;}

/* ---------- MODALES / INTERACCIÓN ---------- */
function openModal(html){$('modal-body').innerHTML=html;$('modal-bg').classList.add('open');}
function closeModal(){$('modal-bg').classList.remove('open');}
function refreshActive(){var p=document.querySelector('.page.active');if(!p)return;var id=p.id.replace('page-','');
  if(id==='tablero')renderTablero();else if(id==='agenda')renderAgenda();else if(id==='cobros')renderCobros();else if(id==='clientas')renderClientas(clTab);else if(id==='insights')renderInsightsPage();}

/* detalle de cita */
var _detIdx=null;
function openDetalle(idx){_detIdx=idx;drawDetalle();}
function drawDetalle(){
  var a=AG[_detIdx];if(!a)return;var adm=S.role==='admin';
  var sts=[['pend','Pendiente'],['conf','Confirmada'],['serv','En servicio'],['real','Realizada']];
  openModal('<div class="modal-title">'+a.c+'</div><div class="modal-sub">'+a.s+' · con '+a.at+' · Sáb 4 jul · '+fmt(a.ini)+'–'+fmt(a.ini+a.dur)+'</div>'+
    '<div class="pills">'+sts.map(function(s){return '<div class="pill'+(a.st===s[0]?' on':'')+'" onclick="setCitaSt('+_detIdx+',\''+s[0]+'\')">'+s[1]+'</div>';}).join('')+'</div>'+
    (adm&&a.st!=='real'?'<button class="wa-full" onclick="toast(\'Abriendo WhatsApp con el mensaje listo… ✓\')">💬 '+(a.st==='conf'?'Recordar':'Confirmar')+' por WhatsApp</button>':'')+
    '<div class="det-acts"><button class="btn-sec" onclick="toast(\'Editar cita (demo)\')">Editar</button>'+(adm&&a.st!=='real'?'<button class="btn-pri" onclick="openCobrar('+_detIdx+')">Cobrar</button>':'')+'</div>'+
    '<div style="font-size:12px;font-weight:500;margin:16px 0 6px">📷 Fotos de la cita</div>'+
    '<div class="photos"><div class="ph a">Antes</div><div class="ph b">Después</div><div class="ph add" onclick="this.className=\'ph a\';this.textContent=\'Antes\';toast(\'Foto agregada ✓\')">＋ Antes</div><div class="ph add" onclick="this.className=\'ph b\';this.textContent=\'Después\';toast(\'Foto agregada ✓\')">＋ Después</div></div>'+
    '<div class="modal-actions"><button class="btn-sec" onclick="closeModal()">Cerrar</button></div>');
}
function setCitaSt(idx,st){AG[idx].st=st;drawDetalle();refreshActive();toast(stName[st]);}

/* cobrar */
var _cobIdx=null,_cobPay='ef';
function openCobrar(idx){_cobIdx=idx;_cobPay='ef';drawCobrar();}
function drawCobrar(){
  var a=AG[_cobIdx];var com=_cobPay==='tj'?Math.round(a.p*0.04):0;
  var pays=[['ef','Efectivo'],['tr','Transferencia'],['tj','Tarjeta']];
  openModal('<div class="modal-title">Cobrar cita</div><div class="modal-sub">'+a.c+' · '+a.s+'</div>'+
    '<div style="text-align:center;font-family:var(--serif);font-size:30px;margin:6px 0 14px">'+money(a.p)+'</div>'+
    '<div class="form-lbl">Método de pago</div><div class="pays">'+pays.map(function(p){return '<div class="pay-opt'+(_cobPay===p[0]?' on':'')+'" onclick="_cobPay=\''+p[0]+'\';drawCobrar()">'+p[1]+'</div>';}).join('')+'</div>'+
    (com?'<div style="font-size:11px;color:#9A7020;background:var(--gold-l);border-radius:8px;padding:7px 10px;margin-top:10px">⚙️ Se registra solo: Comisión 4% terminal · '+money(com)+'</div>':'')+
    '<div class="modal-actions"><button class="btn-sec" onclick="closeModal()">Cancelar</button><button class="btn-pri" onclick="confirmCobro()">Confirmar cobro</button></div>');
}
function confirmCobro(){var a=AG[_cobIdx];var com=_cobPay==='tj'?Math.round(a.p*0.04):0;COB.unshift({c:a.c,s:a.s,at:a.at,m:a.p,pay:_cobPay,com:com||undefined});a.st='real';closeModal();refreshActive();toast('Cobrado '+money(a.p)+' ✓');}

/* nueva cita */
function openNuevaCita(){
  var svcOpts=SERV.map(function(s){return '<option value="'+s.s+'">'+s.s+' · '+money(s.base)+'</option>';}).join('');
  var clOpts=CLI.map(function(c){return '<option value="'+c.n+'">';}).join('');
  var hs='';for(var t=480;t<1140;t+=30)hs+='<option value="'+t+'">'+fmt(t)+'</option>';
  openModal('<div class="modal-title">Nueva cita</div>'+
    formRow('Clienta','<input class="form-ctrl" id="nc-cli" list="nc-cll" placeholder="Nombre" autocomplete="off"><datalist id="nc-cll">'+clOpts+'</datalist>')+
    formRow('Servicio','<select class="form-ctrl" id="nc-svc">'+svcOpts+'</select>')+
    '<div style="display:flex;gap:10px">'+formRow('Atiende','<select class="form-ctrl" id="nc-at"><option>Nao</option><option>Jess</option><option>Moni</option></select>')+formRow('Hora','<select class="form-ctrl" id="nc-h">'+hs+'</select>')+'</div>'+
    '<div class="modal-actions"><button class="btn-sec" onclick="closeModal()">Cancelar</button><button class="btn-pri" onclick="saveNuevaCita()">Guardar cita</button></div>');
  $('nc-h').value=780;
}
function saveNuevaCita(){
  var cli=$('nc-cli').value||'Clienta nueva';var sv=SERV.filter(function(x){return x.s===$('nc-svc').value})[0];
  AG.push({c:cli,s:$('nc-svc').value,at:$('nc-at').value,ini:+$('nc-h').value,dur:sv?sv.dur:60,st:'pend',p:sv?sv.base:600});
  AG.sort(function(a,b){return a.ini-b.ini});closeModal();refreshActive();toast('Cita agendada ✓');
}
/* nueva clienta */

function saveNuevaClienta(){var n=$('ncl-n').value||'Clienta nueva';CLI.unshift({n:n,tel:$('ncl-t').value||'—',v:0,pag:0,dias:0,canal:$('ncl-c').value,fav:'—'});closeModal();refreshActive();toast('Clienta "'+n+'" agregada ✓');}
/* nuevo cobro */
function openNuevoCobro(){
  var clOpts=CLI.map(function(c){return '<option value="'+c.n+'">';}).join('');var svcOpts=SERV.map(function(s){return '<option>'+s.s+'</option>';}).join('');

function saveNuevoCobro(){var pay=$('ncb-pay').value;var m=+$('ncb-m').value||0;var com=pay==='tj'?Math.round(m*.04):0;COB.unshift({c:$('ncb-cli').value||'Clienta',s:$('ncb-svc').value,at:S.user,m:m,pay:pay,com:com||undefined});closeModal();renderCobros();toast('Cobro registrado ✓');}
/* nuevo gasto */
function openNuevoGasto(){
  openModal('<div class="modal-title">Agregar gasto</div>'+
    formRow('Concepto','<input class="form-ctrl" id="ng-c" placeholder="Ej. Insumos pestañas">')+

    '<div class="modal-actions"><button class="btn-sec" onclick="closeModal()">Cancelar</button><button class="btn-pri" onclick="saveNuevoGasto()">Guardar</button></div>');

function openAjustarSaldo(){openModal('<div class="modal-title">Ajustar saldo inicial</div>'+formRow('Saldo inicial','<input class="form-ctrl" id="as-v" type="number" value="20000">')+'<div class="modal-actions"><button class="btn-sec" onclick="closeModal()">Cancelar</button><button class="btn-pri" onclick="closeModal();toast(\'Saldo actualizado ✓\')">Guardar</button></div>');}

initLogin();
